<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ANALISA 7D - Rohli Genteng</title><style>body{background:#000;color:#0f0;font-family:monospace;padding:20px;display:flex;flex-direction:column;align-items:center} .hero-img{width:80px;height:80px;object-fit:cover;border-radius:50%;border:2px solid #0f0;margin-bottom:15px} .card{border:2px solid #0f0;padding:20px;width:100%;max-width:400px;background:#050505;text-align:center} input{width:90%;padding:15px;margin:10px 0;background:#000;border:1px solid #0f0;color:#0f0;font-size:1.2rem;text-align:center;font-family:monospace} button{width:100%;padding:15px;background:#0f0;color:#000;border:none;font-weight:bold;cursor:pointer;margin-top:10px;text-transform:uppercase} .res-box{margin-top:15px;padding:12px;border:1px dashed #0f0;text-align:center} .result-num{font-size:1.5rem;display:block;margin-top:5px;letter-spacing:2px} .back-link{margin-top:20px;color:#0f0;text-decoration:none;font-size:0.9rem;border-bottom:1px solid #0f0}</style></head><body><img src="icon.jpg" class="hero-img"><h2>ANALISA 7 DIGIT</h2><div class="card"><h3>MASUKKAN 4 ANGKA</h3><input type="number" id="input4" placeholder="Contoh: 0345" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4)"><button onclick="prosesAnalisa()">PROSES ACAK 7D</button><div id="resultArea" style="display:none;"><div class="res-box" style="border-color:#0ff; color:#0ff;"><span>HASIL POLA A:</span><strong id="resA" class="result-num"></strong></div><div class="res-box" style="border-color:#f0f; color:#f0f;"><span>HASIL POLA B:</span><strong id="resB" class="result-num"></strong></div></div></div><a href="index.html" class="back-link">< Kembali ke Menu Utama</a><audio id="sound" src="posang.mp3"></audio><script>const dataPola = {"0345":["678","679","789"],"0235":["678","679","789"],"0245":["678","679","789"],"1235":["789"],"1234":["789"],"1345":["678","679","789"],"1245":["678","679","789"]}; function shuffle(array){for(let i=array.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[array[i],array[j]]=[array[j],array[i]]} return array.join(" ")} function prosesAnalisa(){const val=document.getElementById("input4").value;if(val.length<4)return;document.getElementById("sound").play().catch(e=>{});let match=dataPola[val];let fA,fB;if(match){let b=val.split("").map(Number);let p1=match[Math.floor(Math.random()*match.length)].split("").map(Number);let p2=match[Math.floor(Math.random()*match.length)].split("").map(Number);fA=shuffle([...b,...p1]);fB=shuffle([...b,...p2])}else{let m=[];while(m.length<7){let r=Math.floor(Math.random()*10);if(!m.includes(r))m.push(r)}fA=m.join(" ");fB=m.reverse().join(" ")} document.getElementById("resA").innerText=fA;document.getElementById("resB").innerText=fB;document.getElementById("resultArea").style.display="block"}</script></body></html>
