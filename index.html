<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Facebook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="fb-header">
        <h1 class="fb-logo">facebook</h1>
    </header>

    <div class="alert-box">
        Anda harus masuk dulu.
    </div>

    <main class="container">
        <div class="app-banner">
            <div class="phone-icon">📱</div>
            <p>Pasang Facebook untuk Android dan buka lebih cepat.</p>
        </div>

        <form class="login-form">
            <input type="text" placeholder="Email atau Telepon" class="input-field top">
            <input type="password" placeholder="Kata Sandi" class="input-field bottom">
            
          <a href="https://youtube.com/shorts/E8a-FIHQ7g4?si=eNFP7IyGZ5_b2SdT"> <button type="submit" class="btn-login">Masuk</button></a>
        </form>

        <div class="divider">
            <span>atau</span>
        </div>

        <button class="btn-register">Buat Akun Baru</button>

        <div class="footer-links">
            <a href="#">Lupa Kata Sandi?</a> · <a href="#">Pusat Bantuan</a>
        </div>
    </main>

</body>
</html>
