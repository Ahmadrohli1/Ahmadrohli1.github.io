<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ahmad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <img src="profil.jpg" style="width: 100px; border-radius: 50%; border: 3px solid #00ff88;">
        <h1 style="color: #00ff88;">Ahmad</h1>
        <p>Fullstack Developer wannabe.</p>
    </div>

    <div class="card">
        <h2 style="color: #00ff88;">MENU MEDIA</h2>
        
        <p>🖼️ Galeri</p>
        <div class="gallery-grid">
            <img src="foto1.jpg">
            <img src="foto2.jpg">
            <img src="foto3.jpg">
        </div>

        <p>🎵 Musik</p>
        <audio controls><source src="musik.mp3" type="audio/mpeg"></audio>

        <p>📽️ Video</p>
        <video controls><source src="video.mp4" type="video/mp4"></video>
    </div>
</body>
</html>
