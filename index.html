<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Ahmad</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #252525;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #333;
            max-width: 300px;
        }
        h1 { color: #00ff88; margin-bottom: 0.5rem; }
        p { color: #aaa; line-height: 1.6; }
        .status {
            display: inline-block;
            margin-top: 1rem;
            padding: 5px 15px;
            background: #00ff88;
            color: #1a1a1a;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ahmad" alt="Avatar" style="width: 100px; border-radius: 50%; border: 3px solid #00ff88; margin-bottom: 1rem;">
        <h1>Ahmad</h1>
        <p>Fullstack Developer wannabe yang sedang menaklukkan Termux dari HP.</p>
        <div class="status">Online & Connected</div>
    </div>
</body>
</html>
